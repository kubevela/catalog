apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: helm-podinfo
  namespace: default
spec:
  components:
    - name: podinfo
      type: helm
      properties:
        repoType: "helm"
        url: "https://stefanprodan.github.io/podinfo"
        chart: "podinfo"
        version: "6.5.4"
        upgradeCRD: true
